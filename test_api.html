<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Salud</title>
    <style>
        body { 
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .box {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #0d47a1, #1976d2);
            color: white;
            padding: 25px;
            text-align: center;
        }
        .header h1 { margin: 0; font-size: 24px; }
        .content { padding: 25px; }
        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-test { background: #1976d2; color: white; }
        .btn-test:hover { background: #1565c0; transform: translateY(-2px); }
        .btn-clear { background: #f44336; color: white; }
        .result {
            background: #f5f5f5;
            border-radius: 5px;
            padding: 15px;
            margin-top: 20px;
            border-left: 4px solid #0d47a1;
        }
        .result.success { background: #f1f8e9; border-color: #4caf50; }
        .result.error { background: #ffebee; border-color: #f44336; }
        pre {
            background: white;
            padding: 10px;
            border-radius: 3px;
            overflow-x: auto;
            font-size: 13px;
            border: 1px solid #ddd;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="box">
    <div class="header">
        <h1>✓ Test - API Salud del Sistema</h1>
    </div>
    <div class="content">
        <button class="btn-test" onclick="testAPI()">Ejecutar Prueba</button>
        <button class="btn-clear" onclick="document.getElementById('result').innerHTML = ''">Limpiar</button>
        <div id="result"></div>
    </div>
</div>

<script>
async function testAPI() {
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = '<div class="result">Cargando...</div>';
    
    try {
        const url = 'api/api_admin.php?accion=salud_sistema&t=' + Date.now();
        const response = await fetch(url, {
            method: 'GET',
            credentials: 'include'
        });
        
        const text = await response.text();
        console.log('Status:', response.status);
        console.log('Response:', text);
        
        try {
            const data = JSON.parse(text);
            if (data.success) {
                resultDiv.innerHTML = `
                    <div class="result success">
                        <strong>✓ Éxito - JSON válido</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <strong>✗ Error en respuesta</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            }
        } catch (e) {
            resultDiv.innerHTML = `
                <div class="result error">
                    <strong>✗ JSON inválido</strong>
                    <p>Error: ${e.message}</p>
                    <p>Respuesta (primeros 500 caracteres):</p>
                    <pre>${text.substring(0, 500)}</pre>
                </div>
            `;
        }
    } catch (err) {
        resultDiv.innerHTML = `
            <div class="result error">
                <strong>✗ Error de conexión</strong>
                <pre>${err.message}</pre>
            </div>
        `;
    }
}
</script>
</body>
</html>
